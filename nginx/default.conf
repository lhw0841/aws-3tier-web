server {
    listen 80; # 80번 포트로 들어오는 신호를 감시합니다.
    root /usr/share/nginx/html; # 웹 파일들이 있는 위치입니다.
    index index.php index.html; # 주소만 치고 들어오면 이 파일들을 먼저 찾습니다.

    # 만약 파일 확장자가 .php로 끝난다면?
    location ~ \.php$ {
        fastcgi_pass app:9000; # 'app'이라는 이름의 상자(PHP 상자)의 9000번 포트로 넘겨라!
        fastcgi_index index.php;
        # 파일의 전체 경로를 PHP 상자에게 알려줍니다.
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params; # 기본적인 설정값들을 포함시킵니다.
    }
}